services:
  mysql:
    image: mysql:8.0
    container_name: pmp-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pmp_manage
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3307:3306"
    volumes:
      - pmp_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  pmp_mysql_data:
